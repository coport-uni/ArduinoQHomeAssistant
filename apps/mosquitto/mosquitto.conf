# Mosquitto config for the UNO Q HA MCU bridge.
# Two host-local listeners, nothing exposed to the LAN:
#  - 127.0.0.1  for Home Assistant (host-network container)
#  - 172.17.0.1 (docker0) for App Lab app containers, which run on
#    bridged compose networks and cannot reach host loopback
listener 1883 127.0.0.1
listener 1883 172.17.0.1
allow_anonymous true
